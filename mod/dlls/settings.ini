# =============================================================================
# LibretroCpp settings.ini -- install-wide preferences
# =============================================================================
#
# This file is the "frontend config" tier (equivalent to retroarch.cfg). It is
# OPTIONAL: if absent, all values fall back to the in-code defaults shown below
# (the mod logs "settings.ini not present; using defaults" at startup).
#
# Two other config tiers live next to their data and CASCADE per-system / per-
# cart -- do not duplicate them here:
#
#   * Input bindings + frontend hotkeys --> keymaps/*.ini
#       see keymaps/_reference.txt
#   * Libretro core options            --> saves/*.opt
#       per-core: saves/<core_name>.opt
#       per-game: saves/<system_tag>/<rom_id>.opt
#
# This file is GLOBAL ONLY -- the cascade pattern doesn't apply here.
#
# Editing rules:
#   - One [Section] per group, "key = value" per line.
#   - Comments via '#' or ';'. Inline trailing comments are stripped.
#   - To use a default, leave the key commented out or omit it entirely.
#   - Unknown keys / sections are logged as warnings and ignored.
#   - Out-of-range numeric values are clamped to the documented range + logged.
#   - Bad enum spellings keep the default + log a warning.
#
# Reload: not yet hot-reloaded. Re-applied per-DeviceContext on cart eject +
# reinsert. Some keys (sample_rate_hz, ring_buffer_kb, threaded_core) require
# a UE restart.
# =============================================================================


# ----- Default cartridge ------------------------------------------------------
# Fallback core+ROM used by the cartridge dispenser when BP doesn't pass an
# explicit one. Relative to <mod>/cores and <mod>/roms respectively. Absolute
# paths are also accepted.
[Defaults]
# core = snes9x_libretro.dll
# rom  = test.smc


# ----- Frontend UX ------------------------------------------------------------
[Frontend]
# Duration that OSD toasts (Pause/Saved/Loaded/etc) stay visible. Range 0.1..30s.
# osd_toast_duration_sec = 2.0

# Speed multiplier applied while a Frontend_FastForward keymap binding is held.
# Range 1.0..8.0. RetroArch ships this as a configurable too.
# fast_forward_speed = 4.0


# ----- Save states ------------------------------------------------------------
[State]
# Slot range used by Frontend_SaveState_<N> / Frontend_LoadState_<N>. Defaults
# 0..9 match the BP-side hotkey bindings shipped in keymaps/_global.ini --
# widening past 9 requires the user to ADD those extra hotkey bindings too.
# slot_min = 0
# slot_max = 9


# ----- SRAM persistence -------------------------------------------------------
[SRAM]
# Periodic SRAM-to-disk flush cadence (in seconds). Lower = less data loss on
# crash, higher = less disk churn. Range 1..3600.
# flush_interval_sec = 30


# ----- Engine plumbing --------------------------------------------------------
[Runtime]
# Run the libretro core on a dedicated worker thread (off-loads retro_run /
# audio resample / pacing from the game thread). Disable for A/B perf tests
# or to triage worker-induced regressions. Requires UE restart to take effect.
# (Was env LIBRETRO_THREADED_CORE.)
# threaded_core = true


# ----- Audio path -------------------------------------------------------------
[Audio]
# Resampler target output rate. 48 kHz is the native rate of most modern audio
# devices and avoids non-integer-ratio kernel resampling. Range 8000..192000.
# Requires cart eject to take effect.
# sample_rate_hz = 48000

# Pre-buffer threshold before the audio component starts playing on the first
# Submit of a session. Larger = more latency, more crash resistance. Range 4..1024 KB.
# pre_buffer_kb = 32

# Audio SPSC ring capacity (per device). Sized at DeviceContext construction;
# rounded up to power-of-two. Range 16..8192 KB; requires cart eject.
# ring_buffer_kb = 256

# Linear scalar applied to int16 samples at the mixer drain. 0.0 = silence,
# 1.0 = unity, 2.0 = double (clips at int16 max). Range 0.0..2.0. Live -- the
# setting is read per-pull on the mixer thread.
#
# Spatial / 3D / falloff settings are NOT exposed here -- they're handled
# by UE4's in-editor audio attenuation settings on the BP audio component,
# which is the right place for them.
# master_volume = 1.0

# ----- Device lifecycle -------------------------------------------------------
[Device]
# Park-and-claim TTL. How long a dying DeviceContext keeps its core alive
# waiting for a new actor to adopt it. Covers engine hitches / level transitions.
# Too short = lost emu state on slow transitions. Range 0.1..60 sec.
# claim_ttl_sec = 2.0

# Recent-spawn migration window for the BeginPlay-then-EndPlay path
# (UE deferred destruction). Only contexts spawned within this window are
# eligible adopters for a dying context's core. Range 50..10000 ms.
# recent_spawn_window_ms = 1000


# ----- Observability ----------------------------------------------------------
[Debug]
# Bake OSD toasts into the framebuffer so the TV-cord texture path shows them
# (UMG widgets are device-actor-local and don't propagate through the cord).
# Disable if you only want the in-hand widget overlay.
# osd_texture_bake = true

# Persistent FPS counter overlay. Drawn by osd_renderer in the top-left
# corner of the framebuffer, top-left and scaled by resolution
# (GBC=small, N64=larger). Rides the OSD texture-bake path so it shows
# on TV-corded screens too.
# fps_overlay = false

# Log verbosity floor. Messages below this level are dropped before formatting.
# Worker-thread logs (via SafeLog::Send) always honor this; game-thread logs
# that go through LibretroCpp::Logging::Send honor it too. Direct RC::Output::send
# calls remain ungated -- this knob is most effective when paired with UE4SS's
# own global log-level setting.
#   verbose | default | warning | error
# log_verbosity = default

# Categorical gate for high-frequency diagnostics (independent of
# log_verbosity above). Off by default keeps normal play quiet:
# cart load / AV info / errors / shimloader path remaps / one-shot
# init lines all still print. Flip on to see the full spew:
#   * child: retro_run tick #N (~60 Hz)   -- every ~1 sec
#   * child: audio: written=...           -- every ~1 sec
#   * child: port N joypad: 0x.. -> 0x..  -- every button transition
#   * child: port N stick N: first ...    -- one-shots
#   * child: video diag: skip ...         -- per-frame in early frames
#   * child: env: declined cmd=0x...      -- per unsupported env query
#   * child: DEBUG env constants:         -- one-shot
#   * child: [L0] core debug lines        -- core-emitted DEBUG level
#   * child: [L1] BIOS enumeration        -- 40+ lines per PS2 insert
#   * parent: audio[ring] cap=...         -- every ~2 MB pushed
#   * parent: audio[shared-ring] cap=...  -- every ~2 MB pushed
# Plumbed to the child at LOAD_CORE time, so a flip while a cart is
# loaded only takes effect on the next eject + reinsert. Parent-side
# gates take effect immediately.
# verbose = false
