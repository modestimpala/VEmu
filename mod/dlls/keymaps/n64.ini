# Voices of the Void -- LibretroCpp keymap for Nintendo 64 (mupen64plus-next)
#
# Each line: <FKey FName> = <action>[, <action>, ...]
# Empty RHS unbinds. Edits take effect on the next cart insert.
#
# Action vocabulary:
#   Buttons:     B A X Y L R L2 R2 L3 R3 Select Start
#                DPad_Up DPad_Down DPad_Left DPad_Right
#   Gamepad axis: Stick_L_X Stick_L_Y Stick_R_X Stick_R_Y
#   Button-as-axis: <axis>:<value>  e.g. Stick_L_Y:-1.0
#
# N64 retropad (mupen64plus-next defaults):
#   L2 = C-Up      Y = C-Left      L = L-shoulder
#   R2 = C-Down    X = C-Right     R = R-shoulder
#   L3 = Z-trigger
# Analog stick = LEFT analog. Right stick is spare for c-stick repurposing.
#
# Keyboard note: WASD drives the analog stick ONLY (button_axes below); the
# d-pad lives on the arrow keys. Stacking WASD on both d-pad ids and the
# stick broke games that read both paths -- e.g. GoldenEye 007 maps d-pad
# UP to "look down", so WASD made the player walk forward and look at the
# floor at the same time. Almost every N64 game (Mario 64, Banjo, MK64,
# Zelda, 1080) uses the stick as primary movement; the d-pad is rare.
#
# Per-game overlay: drop a <system>.<rom_id>.ini next to this file to
# override the system-level mapping for one cart only. The overlay file
# uses the same [n64] section header and the same vocabulary; only the
# bindings present in the overlay are touched, the rest fall through to
# this file. Example -- if the manifest's RomId for GoldenEye is
# "GoldenEye007" then create <mod_dir>/keymaps/n64.GoldenEye007.ini:
#
#   [n64]
#   ; Disable WASD-as-stick for this game; players use arrow keys for
#   ; d-pad camera and the stick is unused.
#   W =
#   S =
#   A =
#   D =
#
# Empty RHS unbinds. Edits take effect on the next cart insert.

[n64]
# d-pad on arrow keys
Up = DPad_Up
Down = DPad_Down
Left = DPad_Left
Right = DPad_Right

# face buttons
Z = B
X = A

# C-buttons (IJKL cluster mirrors WASD on the right hand)
I = L2
K = R2
J = Y
L = X

# shoulders + Z trigger + start
Q = L
E = R
LeftShift = L3
Enter = Start

# WASD -> LEFT analog stick (full deflection per axis)
W = Stick_L_Y:-1.0
S = Stick_L_Y:+1.0
A = Stick_L_X:-1.0
D = Stick_L_X:+1.0

# gamepad (xinput)
Gamepad_DPad_Up = DPad_Up
Gamepad_DPad_Down = DPad_Down
Gamepad_DPad_Left = DPad_Left
Gamepad_DPad_Right = DPad_Right
Gamepad_FaceButton_Bottom = B
Gamepad_FaceButton_Right = A
Gamepad_FaceButton_Top = X
Gamepad_FaceButton_Left = Y
Gamepad_LeftShoulder = L
Gamepad_RightShoulder = R
Gamepad_LeftTrigger = L3
Gamepad_Special_Right = Start

Gamepad_LeftX = Stick_L_X
Gamepad_LeftY = Stick_L_Y
Gamepad_RightX = Stick_R_X
Gamepad_RightY = Stick_R_Y
