# Voices of the Void -- LibretroCpp frontend control bindings
#
# Frontend controls (pause / fast-forward / save-state / etc.) live here
# instead of the per-system <system>.ini files because they apply across
# every cart, not just one console. Layered overlay:
#
#   _global.ini                   -- this file. Everything below is shipped
#                                    defaults; edit freely.
#   _global.<system>.ini          -- system-wide override (e.g. _global.n64.ini)
#   _global.<system>.<rom>.ini    -- per-cart override (e.g. _global.n64.GoldenEye007.ini)
#
# Each layer's [global] section merges per-LHS-key over the previous
# layer; the last-loaded layer wins on key collision. Empty RHS unbinds.
#
# Frontend bindings dispatch ONLY when a device is currently emu-gated
# (the canonical "user is interacting with this emulator" state set by
# BP via ToggleEmuInput(true)). If two devices are gated at once,
# whichever the keystroke reaches first wins.
#
# Action vocabulary (RHS):
#   Frontend_Pause          ; toggle paused state on key press
#   Frontend_FastForward    ; momentary -- 4x speed while held, 1x on release
#   Frontend_FrameAdvance   ; queue one emulator frame on key press
#   Frontend_Reset          ; soft-reset the loaded core
#   Frontend_QuickSave      ; save state slot 0
#   Frontend_QuickLoad      ; load state slot 0
#   Frontend_SaveState_<N>  ; save state slot 0..9
#   Frontend_LoadState_<N>  ; load state slot 0..9
#   Frontend_ToggleFps      ; toggle debug FPS overlay (runtime only,
#                             does not persist to settings.ini)
#
# OSD toasts ("Saved to slot 0" / "Paused" / etc.) appear via the same
# BP delegate (LastCoreMessage) the libretro core uses for messages.
# Toast duration: 2 seconds.
#
# See _reference.txt for the full FKey FName list and per-system notes.

[global]
F5         = Frontend_QuickSave
F6         = Frontend_QuickLoad
F1         = Frontend_SaveState_1
F2         = Frontend_LoadState_1
F3         = Frontend_SaveState_2
F4         = Frontend_LoadState_2
F8         = Frontend_Reset
F9         = Frontend_ToggleFps
Pause      = Frontend_Pause
Tab        = Frontend_FastForward
BackSpace  = Frontend_FrameAdvance
