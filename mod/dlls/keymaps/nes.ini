# Voices of the Void -- LibretroCpp keymap for NES (fceumm core)
#
# Each line: <FKey FName> = <action>[, <action>, ...]
# Empty RHS unbinds. Edits take effect on the next cart insert.
#
# Action vocabulary:
#   Buttons:     B A X Y L R L2 R2 L3 R3 Select Start
#                DPad_Up DPad_Down DPad_Left DPad_Right
#   Gamepad axis: Stick_L_X Stick_L_Y Stick_R_X Stick_R_Y
#   Button-as-axis: <axis>:<value>  e.g. Stick_L_Y:-1.0
#
# NES uses just D-pad + B + A + Start + Select. libretro RetroPad B is the
# "primary" button (south), A is "secondary" (east); on an xbox pad the
# physical "A" button (south) maps to libretro B.

[nes]
W = DPad_Up
S = DPad_Down
A = DPad_Left
D = DPad_Right
Z = B
X = A
Enter = Start
RightShift = Select

Gamepad_DPad_Up = DPad_Up
Gamepad_DPad_Down = DPad_Down
Gamepad_DPad_Left = DPad_Left
Gamepad_DPad_Right = DPad_Right
Gamepad_FaceButton_Bottom = B
Gamepad_FaceButton_Right = A
Gamepad_Special_Right = Start
Gamepad_Special_Left = Select
